# GCS-first Document Processing Pipeline Configuration
# Copy this file to config.toml and customize for your environment
#
# This pipeline iterates directly over GCS bucket contents and indexes
# to Qdrant. No local index.json or SQLite tracking required.

[gcs]
# GCS bucket containing source files
source_bucket = "my-archive-bucket"
# Prefix path within source bucket (empty string for root)
source_prefix = "data/"

# GCS bucket for cached markdown output (can be same as source)
cache_bucket = "my-archive-bucket"
# Prefix path for cached files (separate from source)
cache_prefix = "cache/"

[processing]
# Number of parallel workers (default: CPU count)
workers = 8
# Maximum concurrent tasks to limit memory usage
max_pending = 20
# Per-file processing timeout in seconds
timeout = 120

[extraction]
# Maximum pages to extract per document (0 = unlimited)
max_pages = 500
# Maximum file size to process in bytes (50MB default)
max_file_size = 52428800

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR
level = "INFO"
# Error log file path
error_file = "extraction_errors.log"

[qdrant]
# Qdrant server URL (can be overridden with QDRANT_URL env var)
url = "http://localhost:6333"
# API key for authentication (can be overridden with QDRANT_API_KEY env var)
api_key = ""
# Default collection for documents (when no routing rules match)
default_collection = "vista"
# Embedding model to use
embedding_model = "sentence-transformers/all-MiniLM-L6-v2"

# Routing rules - documents are routed to collections based on path patterns
# Rules are evaluated in order; first match wins
# Pattern can be a simple substring or regex (use ^ or $ for regex mode)
[[qdrant.routing]]
pattern = "rpms"
collection = "rpms"

[[qdrant.routing]]
pattern = "vista"
collection = "vista"
