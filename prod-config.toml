# Document Extraction Pipeline Configuration
# Bucket: gs://vista-rpms-archive/source
# Scaled config for n2-standard-16

[gcs]
source_bucket = "vista-rpms-archive"
source_prefix = "source/"
cache_bucket = "vista-rpms-archive"
cache_prefix = "cache/"

[processing]
workers = 8
# Backpressure: at most max_pending tasks queued in the thread pool.
# Memory rule of thumb: workers * avg_file_mem (≈ 20 MB) + large-file headroom
max_pending = 16
# Only 1 large (>32 MB) file processed at a time to prevent memory spikes.
# The semaphore blocks additional large-file workers until the current one
# finishes, so the pipeline continues processing normal-sized files in
# parallel while a single large file is being handled.
max_concurrent_large = 1
batch_size = 100
timeout = 600

[extraction]
max_pages = 20000
# max_file_size applies to document extraction (PDFs, office docs).
# 500 MB is generous for even the largest PDF compendia.
max_file_size = 524288000
# max_source_size caps source-code files sent through the chunker.
# Giant .zwr global exports (64 MB+) are ICD data dumps, not useful code,
# and cause extreme memory amplification during tokenisation/chunking.
# 10 MB covers every real MUMPS routine with ample headroom.
max_source_size = 10485760

[logging]
log_level = "INFO"
error_file = "extraction_errors.log"

[qdrant]
# Qdrant vector database configuration
# URL can be overridden via QDRANT_URL environment variable
url = "http://localhost:6333"
# API key can be overridden via QDRANT_API_KEY environment variable
api_key = ""
# Default collection for documents that don't match any routing rule
default_collection = "vista"
# Embedding model (must match mcp-server-qdrant for compatibility)
embedding_model = "sentence-transformers/all-MiniLM-L6-v2"

# Routing rules - evaluated in order, first match wins
# IHS/RPMS documents go to "rpms" collection
[[qdrant.routing]]
pattern = "ihs"
collection = "rpms"

[[qdrant.routing]]
pattern = "rpms"
collection = "rpms"