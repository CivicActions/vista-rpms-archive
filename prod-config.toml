# Document Extraction Pipeline Configuration
# Bucket: gs://vista-rpms-archive/source
# Scaled config for n2-standard-16

[gcs]
source_bucket = "vista-rpms-archive"
source_prefix = "source/"
cache_bucket = "vista-rpms-archive"
cache_prefix = "cache/"

[processing]
workers = 4
# Backpressure: at most max_pending tasks queued in the thread pool.
# Memory rule of thumb: workers * avg_file_mem (≈ 20 MB) + large-file headroom
max_pending = 8
# Only 1 large (>32 MB) file processed at a time to prevent memory spikes.
# The semaphore blocks additional large-file workers until the current one
# finishes, so the pipeline continues processing normal-sized files in
# parallel while a single large file is being handled.
max_concurrent_large = 4
batch_size = 300
timeout = 600
# RSS circuit breaker (GB).  If process RSS exceeds this during archive
# processing, the archive loop aborts to prevent an OOM kill.
# Set to 0 to disable.  100 GB leaves ~28 GB headroom on a 128 GB machine.
max_rss_gb = 100

[extraction]
max_pages = 20000
# max_source_size caps source-code files sent through the chunker.
# Giant .zwr global exports (64 MB+) are ICD data dumps, not useful code,
# and cause extreme memory amplification during tokenisation/chunking.
# 10 MB covers every real MUMPS routine with ample headroom.
max_source_size = 10485760
# max_archive_members is a warning threshold: when an archive has more
# members than this, a warning is logged but all files are still processed.
# Memory safety is handled by periodic gc.collect() and incremental cleanup.
max_archive_members = 5000
# Recycle docling's DocumentConverter every N conversions per thread.
# With subprocess isolation, each child converts once and exits, so
# this value is currently unused but kept for config compatibility.
docling_recycle_after = 10
# Max simultaneous docling conversions.  Each runs in a separate
# subprocess (max_tasks_per_child=1) so all native memory is reclaimed
# by the OS when the child exits.  Increasing this uses more RAM
# transiently (each child loads ~2-4 GB of ML models) but more
# conversions can proceed in parallel.
max_concurrent_docling = 2
# Timeout (seconds) for a single docling conversion subprocess.
# Pathological PDFs can run indefinitely; this kills the child.
docling_conversion_timeout = 600
# Minimum image file size (bytes) for docling OCR.  Images smaller than
# this are almost certainly UI assets (icons, sprites, theme graphics)
# that produce no useful text.  Each docling conversion leaks ~50-100MB
# of native memory, so skipping tiny images saves enormous amounts of RAM.
# 51200 = 50 KB.  Set to 0 to disable (send all images to docling).
min_image_docling_size = 51200

[logging]
log_level = "INFO"
error_file = "extraction_errors.log"

[qdrant]
# Qdrant vector database configuration
# URL can be overridden via QDRANT_URL environment variable
url = "http://localhost:6333"
# API key can be overridden via QDRANT_API_KEY environment variable
api_key = ""
# Default collection for documents that don't match any routing rule
default_collection = "vista"
# Embedding model (must match mcp-server-qdrant for compatibility)
embedding_model = "sentence-transformers/all-MiniLM-L6-v2"

# Routing rules - evaluated in order, first match wins
# IHS/RPMS documents go to "rpms" collection
[[qdrant.routing]]
pattern = "ihs"
collection = "rpms"

[[qdrant.routing]]
pattern = "rpms"
collection = "rpms"
